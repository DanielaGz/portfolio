<h1>Proyectos</h1>
<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
    @for (project of projects; track project.name) {
    <mat-card class="zoom-hover p-4" appearance="outlined">
        <div class="grid grid-rows-1 gap-4">
            <div class="h-[200px] overflow-hidden rounded-lg">
                <img [src]="project.imageUrl" alt="{{ project.name }}"
                    class="w-full h-full object-cover transition-transform duration-300 hover:scale-105" />
            </div>
            <div class="description">
                {{ project.description }}
            </div>
            <h2>
                {{ project.name }}
            </h2>
            <span>Tecnologías</span>
            <div class="flex gap-4 pt-4">
                <a [href]="project.githubUrl" target="_blank"
                    rel="noopener noreferrer">
                    <button mat-stroked-button class="flex items-center space-x-2"
                        class="btn-secondary">
                        <!-- <mat-icon>code</mat-icon> -->
                        <span>Github</span>
                    </button>
                </a>
                <button mat-stroked-button class="btn-primary" (click)="selectProject(project)">Demo</button>
            </div>
        </div>
    </mat-card>
    }

</div>
