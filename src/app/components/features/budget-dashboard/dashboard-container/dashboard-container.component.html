<div class="dashboard-container">
  <app-dashboard-header></app-dashboard-header>

  <div class="dashboard-content">
    <div class="dashboard-grid">
      <!-- Column 1: Income and Savings -->
      <div class="dashboard-column">
        <app-income-card></app-income-card>
        <app-savings-card></app-savings-card>
      </div>

      <!-- Column 2: Needs Expenses -->
      <div class="dashboard-column">
        <app-expense-chart-card [group]="'needs'"></app-expense-chart-card>
        <app-expense-list-card [group]="'needs'"></app-expense-list-card>
      </div>

      <!-- Column 3: Wants Expenses -->
      <div class="dashboard-column">
        <app-expense-chart-card [group]="'wants'"></app-expense-chart-card>
        <app-expense-list-card [group]="'wants'"></app-expense-list-card>
      </div>
    </div>
  </div>
</div>
